<h4>好评积累计划（前30条）</h4>

<tr><td>亲友团</td><td>10条</td><td>开业前3天邀亲友到店，饭后当面请求写点评：「帮我写个真实评价，刚开店攒人气」</td></tr>
<tr><td>堂食引导</td><td>15条</td><td>结账时：「觉得不错方便点评写个评价吗？写完送饮料！」桌上放引导台卡</td></tr>
<tr><td>外卖好评</td><td>5条</td><td>出餐放好评卡：「五星截图给老板微信，下次减2元」</td></tr></table>
<div class="hw hb"><strong>⚠️ 红线：</strong>好评必须基于真实消费，严禁刷单！点评反作弊很严，被抓降星降权。</div>
<h3>📈 稳定期（第15-30天）</h3>
<table><tr><th>动作</th><th>执行人</th><th>具体做法</th></tr>
<tr><td>复购激活</td><td>系统自动</td><td>旗舰会员对7天未到店会员推送「老顾客回馈券」满15减3</td></tr>
<tr><td>外卖冲量</td><td>老板+BD</td><td>参考外卖中心AI诊断优化满减和主图</td></tr>
<tr><td>菜单微调</td><td>老板</td><td>砍掉点击率<5%的菜品，重点推爆款</td></tr>
<tr><td>社区关系</td><td>老板</td><td>给周边店主送小笼尝鲜，互相引流</td></tr></table>
<div class="ho hb"><strong>✅ 30天复盘指标：</strong>①会员≥200 ②点评好评≥30 ③外卖日均≥15单 ④7日复购率≥30% ⑤日均营业额≥¥1500。达标=冷启动成功。</div>`},

{id:5,title:'外卖运营全案',tag:'签约解锁',locked:true,content:`
<h3>📦 外卖上线准备</h3>
<div class="hb"><strong>📋 核心认知：</strong>社区小吃客单低（¥15-22），外卖要赚钱靠<strong>高出单量+合理满减</strong>。小笼包/榨面出餐快、标准化高，天然适合外卖。</div>
<h4>主图与菜单</h4>
<table><tr><th>项目</th><th>标准</th><th>建议</th></tr>
<tr><td>店铺主图</td><td>1:1正方形</td><td>一笼热气腾腾小笼包特写，左上标「嵊州小吃」</td></tr>
<tr><td>菜品图片</td><td>每品必有图</td><td>手机实拍，小笼拍「夹起来有汤汁」，榨面拍「浇头满满」</td></tr>
<tr><td>分类</td><td>≤5个</td><td>招牌必点 / 面食粉类 / 套餐专区 / 饮品小食 / 加料区</td></tr>
<tr><td>SKU</td><td>15-20个</td><td>不贪多，社区外卖顾客决策要快</td></tr></table>
<h4>定价与满减</h4>
<table><tr><th>策略</th><th>方案</th><th>逻辑</th></tr>
<tr><td>菜品定价</td><td>外卖=堂食×1.15-1.2</td><td>覆盖佣金（堂食小笼¥8→外卖¥10）</td></tr>
<tr><td>满减一档</td><td>满20减3</td><td>1人份即达，吸引新客</td></tr>
<tr><td>满减二档</td><td>满35减6</td><td>2人份/加料达标，提客单</td></tr>
<tr><td>满减三档</td><td>满50减10</td><td>家庭/拼单场景</td></tr></table>
<h3>🛵 外卖套餐设计（与堂食差异化）</h3>
<table><tr><th>套餐</th><th>内容</th><th>外卖价</th><th>逻辑</th></tr>
<tr><td>一人食早餐</td><td>小笼6只+豆浆+卤蛋</td><td>¥13.9</td><td>凑满减第一档，降低配送费占比感</td></tr>
<tr><td>午餐能量餐</td><td>炒年糕/榨面+小笼4只+小菜</td><td>¥19.9</td><td>接近满减一档，吃饱+有小吃搭配</td></tr>
<tr><td>双人共享</td><td>小笼10只+榨面+豆腐包2+饮品2</td><td>¥35.9</td><td>精准卡满减二档</td></tr></table>
<h3>🚀 新店外卖冲量（前14天）</h3>
<ol>
<li><strong>Day1-3</strong>：新店流量红利期，开启新客立减¥5（🔧商家后台→营销中心→新客立减），配合满减吸引首单</li>
<li><strong>Day4-7</strong>：参加平台「新店冲刺」活动（🔧商家后台→活动中心→新店加速），争取曝光位</li>
<li><strong>Day8-14</strong>：根据外卖中心AI诊断🔧调整满减梯度和主图排序，重点关注「转化率」和「复购率」两个指标</li>
</ol>
<h3>📝 差评应对预案</h3>
<table><tr><th>差评类型</th><th>回复模板</th><th>内部动作</th></tr>
<tr><td>出餐慢</td><td>「非常抱歉让您久等了！我们已优化出餐流程，下次一定快。送您一张¥3券补偿🙏」</td><td>排查出餐流程，高峰期预蒸小笼备货</td></tr>
<tr><td>口味不合</td><td>「感谢反馈！每个人口味不同，我们虚心接受。欢迎再来试试其他品类🥟」</td><td>统计同类差评数量，超3条需调整配方</td></tr>
<tr><td>配送问题</td><td>「配送由平台负责，我们已反馈。给您发一张¥3券，下次体验更好！」</td><td>联系平台客服投诉骑手</td></tr></table>
<div class="hb"><strong>How落地</strong>：①外卖中心🔧自动回评功能设置好评/差评模板 ②差评2小时内回复（老板手机设闹钟10:00/14:00/20:00查） ③每周日复盘外卖数据（单量/评分/差评TOP3原因）</div>`},

{id:6,title:'会员运营与活动策划',tag:'签约解锁',locked:true,content:`
<h3>💳 旗舰会员系统配置</h3>
<h4>会员卡设计</h4>
<table><tr><th>项目</th><th>设置</th><th>Why</th></tr>
<tr><td>入会方式</td><td>扫码免费入会（零门槛）</td><td>社区小吃¥15客单，收费入会劝退率极高</td></tr>
<tr><td>入会礼</td><td>¥3无门槛券（3天有效）</td><td>短有效期促快速二次消费</td></tr>
<tr><td>积分规则</td><td>消费1元=1积分，100积分=¥1</td><td>简单好懂，1%回馈率成本可控</td></tr>
<tr><td>会员日</td><td>每周三「会员日」小笼加1只</td><td>固定一天拉客，培养消费习惯</td></tr></table>
<div class="hb"><strong>🔧 操作路径</strong>：美团商家后台→旗舰会员→会员卡设置→免费入会→设入会礼（¥3券/3天有效）→开启积分→设会员日</div>

<h3>🎯 潜客发券（旗舰会员核心功能）</h3>
<p><strong>What</strong>：浏览过门店但未消费的顾客，系统自动推送优惠券吸引首次到店。</p>
<p><strong>How</strong>：🔧 旗舰会员→智能营销→潜客发券→设券面额¥3满15可用→开启。<strong>这是无成本获客</strong>——只对真来消费的人核销，没来的不花一分钱。</p>

<h3>🎫 团购会员卡（团购→会员转化链路）</h3>
<p><strong>What</strong>：顾客买团购券→到店核销→自动变会员。不需要额外动作，核销就入会。</p>
<p><strong>How</strong>：🔧 旗舰会员→会员卡设置→开启「团购自动入会」→选择入会礼。配合大众点评上设「嵊州经典早餐¥9.9」团购套餐，一石二鸟——团购拉新客+自动转会员。</p>

<h3>📅 7-9月活动日历</h3>
<table><tr><th>月份</th><th>节点</th><th>活动</th><th>目标</th></tr>
<tr><td rowspan="2">7月</td><td>开业首月</td><td>开业系列活动（买一送一/集赞/入会送券）</td><td>会员200+、好评30+</td></tr>
<tr><td>暑假</td><td>「亲子套餐」小笼+豆浆+卤蛋¥12.9，儿童免费加一杯豆浆</td><td>拉家庭客群</td></tr>
<tr><td rowspan="2">8月</td><td>七夕(8/22)</td><td>双人套餐¥29.9（小笼+榨面+饮品×2），情侣到店合影发圈送年糕</td><td>提客单+社交传播</td></tr>
<tr><td>开学季</td><td>「开学能量早餐」套餐：连续打卡5天早餐送第6天免费</td><td>培养早餐复购习惯</td></tr>
<tr><td rowspan="2">9月</td><td>中秋(9/21)</td><td>消费满¥30送嵊州特色手工月饼1个（限量100个）</td><td>提客单+节日氛围</td></tr>
<tr><td>秋分</td><td>「秋日暖食」推出季节限定：桂花年糕¥15</td><td>季节新品引话题</td></tr></table>
<div class="hb"><strong>How</strong>：每个活动提前3天在🔧商家后台→营销中心设置好券/套餐，提前2天朋友圈预热，活动结束当天复盘数据（核销率/新增会员/客单变化）。</div>

<h3>💰 储值方案（低客单慎用，仅做备选）</h3>
<div class="hw hb"><strong>⚠️ 重要提醒：</strong>人均¥15-22的小吃店，储值不是主菜。强推高额储值会让老板客户都不舒服。以下方案仅在老板有意愿时推出，<strong>绝不硬塞</strong>。</div>
<table><tr><th>档位</th><th>充值</th><th>赠送</th><th>实际折扣</th><th>适合谁</th></tr>
<tr><td>轻量档</td><td>¥50</td><td>送¥5</td><td>9.1折</td><td>试探型顾客，约3-4次消费</td></tr>
<tr><td>常客档</td><td>¥100</td><td>送¥12</td><td>8.9折</td><td>固定吃早餐的居民，约7次消费</td></tr></table>
<p><strong>话术</strong>：「您经常来的话充100送12比较划算，大概吃7次就用完。不充也完全没关系，会员积分也在攒着呢。」——<strong>给选择权，不施压</strong>。</p>`},

{id:8,title:'执行手册（话术+SOP+检查表）',tag:'签约解锁',locked:true,content:`
<h3>📋 每日SOP（开店→营业→打烊）</h3>
<table><tr><th>时间</th><th>事项</th><th>责任人</th><th>标准</th></tr>
<tr><td>6:00</td><td>开机：收银机+打印机+外卖接单</td><td>早班员工</td><td>设备全部在线，外卖开始接单</td></tr>
<tr><td>6:15</td><td>备料检查：小笼包馅/面皮/豆浆/年糕</td><td>厨房</td><td>早高峰备量≥100笼小笼包</td></tr>
<tr><td>10:00</td><td>查外卖评价+回复</td><td>老板/店长</td><td>差评2小时内回复</td></tr>
<tr><td>11:00</td><td>午高峰前补货+外卖套餐检查</td><td>厨房</td><td>午餐热卖品备足</td></tr>
<tr><td>14:00</td><td>查大众点评新评价+回复</td><td>老板</td><td>好评感谢，差评2小时解决</td></tr>
<tr><td>20:00</td><td>晚班收尾：查外卖最后一波评价+关机</td><td>晚班员工</td><td>所有差评已处理</td></tr>
<tr><td>20:30</td><td>日结：看收银日报（堂食/外卖/团购分拆）</td><td>老板</td><td>对账无误，记录当日异常</td></tr></table>

<h3>💬 五大场景话术卡</h3>

<div class="sc"><div style="color:var(--al);font-weight:600">场景1⃣ 推套餐（点餐时）</div><div style="color:var(--t1);font-style:italic;margin-top:8px">「您好，我们有个嵊州双拼午餐¥16.9，一份榨面/年糕加4只小笼再送豆浆，比单点省3-5块，您看要不要试试？」</div><div style="color:var(--t3);font-size:13px;margin-top:8px">不选→不追，微笑说「好的那单点也行」</div></div>

<div class="sc"><div style="color:var(--al);font-weight:600">场景2⃣ 推会员（结账时）</div><div style="color:var(--t1);font-style:italic;margin-top:8px">「扫一下这个码免费成为会员，今天直接送您一张3块钱券，下次来就能用。」</div><div style="color:var(--t3);font-size:13px;margin-top:8px">嫌麻烦→「就扫一下就好，不用填信息，2秒钟」</div></div>

<div class="sc"><div style="color:var(--al);font-weight:600">场景3⃣ 好评引导（餐后）</div><div style="color:var(--t1);font-style:italic;margin-top:8px">「味道还合口味吗？如果觉得不错方便在大众点评写两句吗？写完送您一杯豆浆！」</div><div style="color:var(--t3);font-size:13px;margin-top:8px">不愿意→不强求，微笑说「没关系，欢迎下次再来」</div></div>

<div class="sc"><div style="color:var(--al);font-weight:600">场景4⃣ 外卖出餐（打包时）</div><div style="color:var(--t1);font-style:italic;margin-top:8px">包装袋里放好评卡：「亲～五星好评截图发给老板微信，下次点餐立减2元哦！」</div><div style="color:var(--t3);font-size:13px;margin-top:8px">好评卡成本<¥0.1/张，转化率约10-15%</div></div>

<div class="sc"><div style="color:var(--al);font-weight:600">场景5⃣ 处理投诉</div><div style="color:var(--t1);font-style:italic;margin-top:8px">「真的很抱歉给您带来不好的体验。这个问题是我们的责任，我马上帮您处理。给您补一份/退款/送一张券，您看可以吗？」</div><div style="color:var(--t3);font-size:13px;margin-top:8px">原则：先道歉→承认问题→给方案。绝不争辩。</div></div>

<h3>📝 每周检查表（老板/店长用）</h3>
<table><tr><th>检查项</th><th>频率</th><th>达标标准</th><th>不达标怎么办</th></tr>
<tr><td>点评新评价数</td><td>每周</td><td>≥5条/周</td><td>加强结账时引导话术，台卡是否醒目</td></tr>
<tr><td>外卖评分</td><td>每周</td><td>≥4.5分</td><td>分析差评TOP3原因，逐个解决</td></tr>
<tr><td>会员新增数</td><td>每周</td><td>≥30人/周</td><td>检查员工是否在推，扫码台卡是否到位</td></tr>
<tr><td>外卖日均单量</td><td>每周</td><td>趋势上升</td><td>查外卖中心AI诊断，调整满减/主图</td></tr>
<tr><td>复购率</td><td>每月</td><td>≥30%</td><td>检查会员券是否按时发放，菜品品质是否稳定</td></tr></table>`}
];


function render(){
  const g=document.getElementById('G');
  g.innerHTML='';
  CH.forEach(c=>{
    const show=!c.locked||unlocked;
    const d=document.createElement('div');
    d.className='cd'+(c.locked&&!unlocked?' lk':'');
    d.innerHTML='<div class="cn">'+(c.locked&&!unlocked?'\u{1F512}':('0'+c.id))+'</div><div class="ct">'+c.title+'</div><span class="tg '+(c.locked?'tl':'tf')+'">'+c.tag+'</span>';
    if(show) d.onclick=()=>openCh(c);
    g.appendChild(d);
  });
}

function openCh(c){
  document.getElementById('mN').textContent='0'+c.id;
  document.getElementById('mT').textContent=c.title;
  document.getElementById('mB').innerHTML=c.content;
  document.getElementById('O').classList.add('active');
  document.body.style.overflow='hidden';
}

function C(){
  document.getElementById('O').classList.remove('active');
  document.body.style.overflow='';
}

function U(){
  const v=document.getElementById('P').value;
  const m=document.getElementById('M');
  if(v===PWD){unlocked=true;render();m.innerHTML='<span style="color:var(--ok)">\u2705 解锁成功！点击任意章节查看完整方案</span>';document.querySelector('.ub').style.borderColor='rgba(0,200,83,.4)';}
  else{m.innerHTML='<span style="color:var(--pl)">\u274C 密码错误，请联系BD获取</span>';}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')C();});
render();

</script>
</body>
