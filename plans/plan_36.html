.particle{position:absolute;width:4px;height:4px;background:var(--primary);border-radius:50%;opacity:.3;animation:float 15s infinite ease-in-out}

.particle:nth-child(1){top:10%;left:10%;animation-delay:0s}.particle:nth-child(2){top:20%;left:80%;animation-delay:2s}.particle:nth-child(3){top:60%;left:20%;animation-delay:4s}.particle:nth-child(4){top:80%;left:70%;animation-delay:6s}.particle:nth-child(5){top:40%;left:50%;animation-delay:8s}.particle:nth-child(6){top:90%;left:30%;animation-delay:1s}.particle:nth-child(7){top:30%;left:90%;animation-delay:3s}.particle:nth-child(8){top:70%;left:40%;animation-delay:5s}.particle:nth-child(9){top:50%;left:60%;animation-delay:7s}.particle:nth-child(10){top:15%;left:45%;animation-delay:9s}
.wave-container{position:fixed;bottom:0;left:0;right:0;height:100px;pointer-events:none;z-index:0;overflow:hidden}
.wave{position:absolute;bottom:0;left:-50%;width:200%;height:100%;animation:waveAnim 12s linear infinite}

.wave svg{width:100%;height:100%}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 20px;background:radial-gradient(ellipse at center,rgba(229,57,53,.08) 0%,transparent 70%)}

@keyframes pulseGlow{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}

.stats-row{display:flex;gap:40px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.stat-item{text-align:center}

.main-content{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px 100px}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;margin-top:40px}
.section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.section-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-1);opacity:0;transition:opacity .3s}
.section-card:hover{background:var(--bg-card-hover);border-color:var(--primary);transform:translateY(-4px);box-shadow:var(--shadow)}
.section-card:hover::before{opacity:1}
.section-card.locked{opacity:.5;cursor:not-allowed}
.section-card.locked:hover{transform:none;box-shadow:none;border-color:var(--border)}
.section-num{font-family:'Inter',sans-serif;font-size:2rem;font-weight:900;color:var(--primary);margin-bottom:8px}

@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);font-size:18px;transition:all .2s}
.modal-close:hover{background:rgba(229,57,53,.2);color:var(--primary-light)}
.modal-num{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:var(--primary);margin-bottom:8px}

.modal-content{color:var(--text-secondary);line-height:1.8;font-size:15px}
.modal-content h3{color:var(--text-primary);font-size:1.1rem;margin:24px 0 12px;font-weight:700}
.modal-content h4{color:var(--primary-light);font-size:1rem;margin:20px 0 10px;font-weight:600}
.modal-content p{margin-bottom:12px}
.modal-content ul,.modal-content ol{margin:12px 0;padding-left:20px}
.modal-content li{margin-bottom:8px}
.modal-content strong{color:var(--text-primary)}
.modal-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.modal-content th{background:rgba(229,57,53,.12);color:var(--primary-light);padding:10px 12px;text-align:left;font-weight:700;border-bottom:1px solid var(--border)}

.modal-content tr:hover td{background:rgba(255,255,255,.02)}
.highlight-card{background:rgba(229,57,53,.06);border:1px solid rgba(229,57,53,.2);border-radius:12px;padding:16px 20px;margin:16px 0}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0}
.metric-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.metric-box .m-value{font-family:'Inter',sans-serif;font-size:1.5rem;font-weight:900;color:var(--primary-light)}
.metric-box .m-label{font-size:12px;color:var(--text-muted);margin-top:4px}
.footer{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;position:relative;z-index:1}
@media(max-width:768px){.section-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}.modal{padding:24px}.stats-row{gap:20px}.unlock-bar{flex-direction:column}.unlock-bar input{width:100%}}
</style>

{num:'01',title:'数据基石',tag:'现状诊断',locked:false,content:`
<h3>📊 经营数据概览</h3>
<div class="metric-grid">
<div class="metric-box"><div class="m-value">¥15万</div><div class="m-label">月营收</div></div>
<div class="metric-box"><div class="m-value">¥28</div><div class="m-label">客单价</div></div>

<div class="metric-box"><div class="m-value">~5,357人</div><div class="m-label">月消费人次</div></div>
</div>
<div class="highlight-card"><strong>数据交叉验证：</strong>月流水¥150,000 ÷ 客单¥28 ≈ 5,357人/月 ÷ 30天 ≈ 179人/天。80㎡快餐店日均179客次（约12张桌×午市3轮+晚市2轮），数据自洽 ✅</div>
<h3>⚠️ 核心问题诊断</h3>
<table><tr><th>维度</th><th>现状</th><th>问题</th></tr>
<tr><td>时段结构</td><td>午市占比约70%</td><td>晚市+外卖贡献不足，坪效未充分释放</td></tr>
<tr><td>复购率</td><td>⚠️ 预估30%-35%</td><td>快餐品类标杆应达50%+，存在20pct提升空间</td></tr>
<tr><td>外卖占比</td><td>⚠️ 预估20%-25%</td><td>凤起路商务区外卖潜力巨大，应提至40%+</td></tr>
<tr><td>会员渗透</td><td>已签旗舰版但未激活</td><td>需立即启动会员体系，锁住午间回头客</td></tr>
<tr><td>线上评分</td><td>未知</td><td>点评/外卖评分是公域流量基础，需重点建设</td></tr></table>
<h3>💡 机会判断</h3>
<p>凤起路是杭州上城区核心商务动脉，地铁1号线凤起路站辐射大量写字楼上班族。<strong>人均¥28的川渝快餐精准命中午间刚需</strong>，但当前门店过度依赖午市堂食，晚市和外卖两大增量空间未打开。</p>
<p>核心策略方向：<strong>「午市锁客 + 外卖破量 + 晚市拉新」</strong>三管齐下，3个月目标月流水从15万提升至19-20万。</p>`},

{num:'02',title:'商圈竞品分析',tag:'知己知彼',locked:false,content:`

<p><strong>位置特征：</strong>凤起路168号，上城区核心地段，距地铁1号线凤起路站步行约5分钟。周边500米内有多栋写字楼（恒祺商务中心、浙江国际大酒店写字区、凤起时代大厦），辐射上班族约8,000-12,000人。</p>

<h3>⚔️ 周边3公里核心竞品逐一分析</h3>

<tr><td><strong>丁妈麻辣香锅</strong></td><td>麻辣香锅/¥72</td><td>评分仅5.7差评率60%；价格贵等待久</td><td>性价比碾压+评分做到4.0+截流其不满客群</td></tr>

{num:'03',title:'核心策略',tag:'三板斧',locked:false,content:`
<h3>🎯 增长三板斧：午市锁客 × 外卖破量 × 晚市拉新</h3>
<h4>第一板斧：午市锁客 —— 储值+集章双引擎</h4>

<ul>
<li><strong>储值方案：</strong>充300送30（到账330元），锁定约12顿午餐，回本周期2.5周</li>
<li><strong>集章卡：</strong>消费满5次送1份小菜（成本约3元），刺激从"偶尔来"变"固定来"</li>
<li><strong>执行路径：</strong>🔧 美团会员营销旗舰版→储值活动→设置充300送30档位，POS结账自动弹窗推荐</li>

{num:'04',title:'公域引流策略',tag:'大众点评+外卖',locked:false,content:`

function renderGrid(){
  const grid=document.getElementById('sectionGrid');
  grid.innerHTML='';
  sections.forEach((s,i)=>{
    const isLocked=s.locked&&!unlocked;
    const card=document.createElement('div');
    card.className='section-card'+(isLocked?' locked':'');
    card.innerHTML=`
      ${isLocked?'<span class="lock-icon">🔒</span>':''}
      <div class="section-num">${s.num}</div>
      <div class="section-title">${s.title}</div>
      <div class="section-tag">${s.tag}</div>
    `;
    if(!isLocked){card.onclick=()=>openModal(i)}
    grid.appendChild(card);
  });
  document.getElementById('unlockBar').style.display=unlocked?'none':'flex';
}

function openModal(i){
  const s=sections[i];
  document.getElementById('modalNum').textContent=`Chapter ${s.num}`;
  document.getElementById('modalTitle').textContent=s.title;
  document.getElementById('modalContent').innerHTML=s.content;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay')&&!e.target.classList.contains('modal-close'))return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow='';
}

function tryUnlock(){
  const input=document.getElementById('unlockInput');
  const feedback=document.getElementById('unlockFeedback');
  if(input.value===UNLOCK_CODE){
    unlocked=true;
    renderGrid();
    feedback.textContent='✅ 已解锁全部章节';
    feedback.style.color='#4CAF50';
  }else{
    feedback.textContent='解锁码不正确';
    feedback.style.color='#E53935';
    input.value='';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal(e)});
renderGrid();
