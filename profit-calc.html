<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门店盈利测算 · 雄狮方案工厂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #F5F7FA;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo {
    font-size: 22px;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,.55);
    margin-top: 2px;
  }

  /* ── 导出按钮区 ── */
  .export-bar {
    background: #fff;
    border-bottom: 1px solid #E5E7EB;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .export-bar-tip {
    font-size: 13px;
    color: #6B7280;
    flex: 1;
    min-width: 180px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .18s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: #fff;
    box-shadow: 0 2px 8px rgba(99,102,241,.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: #F3F4F6;
    color: #374151;
    border: 1px solid #E5E7EB;
  }
  .btn-secondary:hover { background: #E5E7EB; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ── 计算器容器 ── */
  .calc-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ── 导出预览卡片 ── */
  #export-preview-container {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    overflow-y: auto;
    padding: 20px;
  }
  #export-preview-container.visible { display: flex; align-items: flex-start; justify-content: center; }
  .export-preview-inner {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    max-width: 860px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .export-preview-header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .export-preview-title { color: #fff; font-size: 15px; font-weight: 700; }
  .export-preview-actions { display: flex; gap: 8px; }
  #export-canvas-wrap { padding: 16px; background: #F5F7FA; overflow: hidden; }
  #export-canvas-wrap canvas { max-width: 100%; display: block; border-radius: 8px; }

  /* ── 截图目标区（隐藏在屏幕外，用于生成图片） ── */
  #screenshot-target {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 820px;
    background: #fff;
    padding: 0;
  }

  /* ── toast ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a2e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── 返回方案工厂提示 ── */
  .back-hint {
    margin: 0 0 16px 0;
    padding: 12px 16px;
    background: linear-gradient(135deg, #EEF2FF, #F5F3FF);
    border: 1px solid #C7D2FE;
    border-radius: 10px;
    font-size: 13px;
    color: #4338CA;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-logo">🦁</span>
    <div>
      <div class="header-title">门店盈利测算</div>
      <div class="header-sub">雄狮方案工厂 · 辅助工具</div>
    </div>
  </div>
</div>

<!-- 导出操作栏 -->
<div class="export-bar">
  <div class="export-bar-tip">💡 填写门店数据 → 测算完成后，点「出方案」直接带数据提交</div>
  <button class="btn btn-secondary" id="btn-reset" onclick="resetCalc()">🔄 重置</button>
  <button class="btn btn-secondary" id="btn-export" onclick="exportImage()">📸 导出图片</button>
  <button class="btn btn-primary" id="btn-to-plan" onclick="goToPlan()" disabled style="background:#e8001c;color:#fff;border-color:#e8001c;opacity:0.45;cursor:not-allowed">📋 出方案</button>
</div>

<!-- 计算器主体 -->
<div class="calc-wrapper">
  <div class="back-hint">
    📌 测算完成后，点「导出图片」保存结果，然后返回方案工厂提交表单，上传该图片作为参考附件。
  </div>
  <div id="spc-host">
    <store-profit-calculator mode="full" id="spc-main"></store-profit-calculator>
  </div>
</div>

<!-- 导出预览弹窗 -->
<div id="export-preview-container">
  <div class="export-preview-inner">
    <div class="export-preview-header">
      <span class="export-preview-title">📸 导出预览</span>
      <div class="export-preview-actions">
        <button class="btn btn-primary" id="btn-download" onclick="downloadImage()">⬇️ 保存图片</button>
        <button class="btn btn-secondary" onclick="closePreview()" style="color:#fff;background:rgba(255,255,255,.15);border-color:transparent">✕ 关闭</button>
      </div>
    </div>
    <div id="export-canvas-wrap">
      <canvas id="export-canvas"></canvas>
    </div>
  </div>
</div>

<!-- 截图目标（隐藏，用于生成干净的截图内容） -->
<div id="screenshot-target"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 引入计算器 Web Component -->
<script type="module" src="./store-profit-calculator/component.js"></script>

<!-- 引入 html2canvas（CDN） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// ── Toast ──
function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── 重置 ──
function resetCalc() {
  const spc = document.getElementById('spc-main');
  if (spc && spc.reset) {
    spc.reset();
    showToast('已重置');
  }
}

// ── 构建导出内容 HTML ──
function buildExportHTML(result) {
  if (!result) return null;
  const r = result;
  const profitColor = r.monthProfit > 0 ? '#10B981' : r.monthProfit < 0 ? '#EF4444' : '#6B7280';
  const rateColor = r.profitRate >= 15 ? '#10B981' : r.profitRate >= 5 ? '#F59E0B' : '#EF4444';
  const verdict = r.profitRate >= 20 ? '利润优秀 🌟' : r.profitRate >= 15 ? '盈利健康 ✅' : r.profitRate >= 8 ? '盈利一般 ⚠️' : r.profitRate >= 0 ? '微利警戒 🔴' : '亏损 ❌';
  const fmt = n => n >= 10000 ? (n / 10000).toFixed(1) + '万' : n.toFixed(0);
  const fmtFull = n => Math.abs(n) >= 10000 ? (n / 10000).toFixed(2) + '万' : n.toFixed(0);

  const costRows = (r.costBreakdown || []).map(item => `
    <tr>
      <td style="padding:7px 12px;color:#374151;font-size:13px">${item.name}</td>
      <td style="padding:7px 12px;text-align:right;color:#111827;font-size:13px;font-weight:600">${fmtFull(item.amount)} 元</td>
      <td style="padding:7px 12px;text-align:right;color:#6B7280;font-size:12px">${item.pctOfRevenue}%</td>
    </tr>
  `).join('');

  const storageTiers = (r.proposalData?.storageTiers || []).map(t => `
    <div style="flex:1;min-width:140px;padding:12px 14px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;text-align:center">
      <div style="font-size:11px;color:#6B7280;margin-bottom:4px">${t.label}</div>
      <div style="font-size:18px;font-weight:800;color:#1a1a2e">¥${t.amount}</div>
      <div style="font-size:11px;color:#10B981;margin-top:3px">赠 ¥${t.gift}</div>
    </div>
  `).join('');

  const diagTags = (r.proposalData?.diagnosisTags || []).map(tag =>
    `<span style="display:inline-block;padding:4px 10px;background:#EEF2FF;color:#4338CA;border-radius:20px;font-size:12px;margin:3px 4px 3px 0">${tag}</span>`
  ).join('');

  const now = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

  return `
<div style="font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#fff;width:820px;padding:0">
  <!-- 标题栏 -->
  <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 24px;display:flex;align-items:center;gap:12px">
    <span style="font-size:26px">🦁</span>
    <div>
      <div style="font-size:17px;font-weight:800;color:#fff">门店盈利测算报告</div>
      <div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:2px">雄狮方案工厂 · ${now}</div>
    </div>
  </div>

  <div style="padding:20px 24px">
    <!-- 核心数据 4格 -->
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      ${[
        { label: '月营业收入', val: fmt(r.totalRevenue) + '元', sub: `堂食${fmt(r.monthlyDineInRevenue)} · 外卖${fmt(r.monthlyTakeoutRevenue)}`, color: '#6366F1' },
        { label: '月总成本', val: fmt(r.totalCost) + '元', sub: `食材占比 ${r.totalRevenue > 0 ? r.foodCostRatio.toFixed(0) + '%' : '--'}`, color: '#F59E0B' },
        { label: '月净利润', val: (r.monthProfit >= 0 ? '+' : '') + fmtFull(r.monthProfit) + '元', sub: `年利润 ${fmt(r.yearProfit)}元`, color: profitColor },
        { label: '利润率', val: r.totalRevenue > 0 ? r.profitRate.toFixed(1) + '%' : '--', sub: verdict, color: rateColor },
      ].map(c => `
        <div style="flex:1;min-width:160px;padding:14px 16px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:12px">
          <div style="font-size:12px;color:#6B7280;margin-bottom:6px">${c.label}</div>
          <div style="font-size:20px;font-weight:800;color:${c.color};line-height:1.2">${c.val}</div>
          <div style="font-size:11px;color:#9CA3AF;margin-top:4px">${c.sub}</div>
        </div>
      `).join('')}
    </div>

    <!-- 成本明细 + 盈亏平衡 -->
    <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap">
      <!-- 成本明细表 -->
      <div style="flex:3;min-width:280px">
        <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:10px">📊 成本明细</div>
        <table style="width:100%;border-collapse:collapse;background:#F9FAFB;border-radius:10px;overflow:hidden;border:1px solid #E5E7EB">
          <thead>
            <tr style="background:#F3F4F6">
              <th style="padding:8px 12px;text-align:left;font-size:12px;color:#6B7280;font-weight:600">项目</th>
              <th style="padding:8px 12px;text-align:right;font-size:12px;color:#6B7280;font-weight:600">金额</th>
              <th style="padding:8px 12px;text-align:right;font-size:12px;color:#6B7280;font-weight:600">占收入%</th>
            </tr>
          </thead>
          <tbody>${costRows}</tbody>
          <tfoot>
            <tr style="background:#EEF2FF">
              <td style="padding:8px 12px;font-weight:700;font-size:13px;color:#4338CA">合计</td>
              <td style="padding:8px 12px;text-align:right;font-weight:700;font-size:13px;color:#4338CA">${fmtFull(r.totalCost)} 元</td>
              <td style="padding:8px 12px;text-align:right;font-weight:700;font-size:13px;color:#4338CA">${r.totalRevenue > 0 ? (r.totalCost / r.totalRevenue * 100).toFixed(1) : '--'}%</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- 盈亏平衡 + 敏感性 -->
      <div style="flex:2;min-width:200px;display:flex;flex-direction:column;gap:12px">
        <!-- 盈亏平衡 -->
        <div style="padding:14px 16px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:12px">
          <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:10px">⚖️ 盈亏平衡</div>
          ${r.breakEven ? `
            <div style="margin-bottom:8px">
              <div style="font-size:11px;color:#6B7280">盈亏平衡营收</div>
              <div style="font-size:16px;font-weight:700;color:#1a1a2e">${fmt(r.breakEven.revenue)} 元/月</div>
            </div>
            <div style="margin-bottom:8px">
              <div style="font-size:11px;color:#6B7280">盈亏平衡翻台率</div>
              <div style="font-size:16px;font-weight:700;color:#6366F1">${r.breakEven.turnoverRate ? r.breakEven.turnoverRate.toFixed(2) : '--'} 次/天</div>
            </div>
          ` : '<div style="color:#9CA3AF;font-size:13px">请填写数据</div>'}
        </div>

        <!-- 月储值目标 -->
        ${r.proposalData?.monthlyStorageTarget > 0 ? `
        <div style="padding:14px 16px;background:linear-gradient(135deg,#EEF2FF,#F5F3FF);border:1px solid #C7D2FE;border-radius:12px">
          <div style="font-size:14px;font-weight:700;color:#4338CA;margin-bottom:8px">💳 月储值目标</div>
          <div style="font-size:22px;font-weight:800;color:#4338CA">${fmt(r.proposalData.monthlyStorageTarget)} 元</div>
          <div style="font-size:11px;color:#6366F1;margin-top:4px">约占月营收 ${r.totalRevenue > 0 ? (r.proposalData.monthlyStorageTarget / r.totalRevenue * 100).toFixed(0) : '--'}%</div>
        </div>
        ` : ''}
      </div>
    </div>

    <!-- 储值档位建议 -->
    ${storageTiers ? `
    <div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:10px">💰 储值档位建议</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">${storageTiers}</div>
    </div>
    ` : ''}

    <!-- 诊断标签 -->
    ${diagTags ? `
    <div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:8px">🏷️ 诊断标签</div>
      <div>${diagTags}</div>
    </div>
    ` : ''}

    <!-- 底部水印 -->
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6;text-align:right;font-size:11px;color:#D1D5DB">
      由 雄狮方案工厂 生成 · lion-plan-factory.mynocode.host
    </div>
  </div>
</div>
  `;
}

// ── 导出图片 ──
let latestResult = null;

// ── 以测算数据出方案 ──
function goToPlan() {
  const spc = document.getElementById('spc-main');
  const result = spc?.getResult ? spc.getResult() : latestResult;
  if (!result || result.totalRevenue === 0) {
    showToast('⚠️ 请先填写门店数据并完成测算');
    return;
  }
  // 把核心数据存入 localStorage，供方案提交页读取
  const payload = {
    ts: Date.now(),
    // 核心指标
    totalRevenue: result.totalRevenue,
    monthProfit: result.monthProfit,
    profitRate: +result.profitRate.toFixed(1),
    rentRatio: +result.rentRatio.toFixed(1),
    laborRatio: +result.laborRatio.toFixed(1),
    foodCostRatio: +result.foodCostRatio.toFixed(1),
    totalTables: result.totalTables,
    turnoverActual: result.breakEvenTurnover > 0 ? result.breakEvenTurnover : undefined,
    breakEvenTurnover: +result.breakEvenTurnover.toFixed(2),
    totalMonthlyCustomers: result.totalMonthlyCustomers,
    takeoutActualRatio: +result.takeoutActualRatio.toFixed(1),
    // 方案工厂对接数据
    proposalData: result.proposalData,
    // 成本明细摘要（给大橘参考）
    costBreakdown: result.costBreakdown.map(c => ({
      name: c.name,
      amount: Math.round(c.amount),
      pct: c.pctOfRevenue
    })),
  };
  localStorage.setItem('lionProfitCalcResult', JSON.stringify(payload));
  showToast('✅ 测算数据已保存，正在跳转方案提交...');
  setTimeout(() => {
    window.location.href = 'https://lion-plan-factory.mynocode.host/#/submit';
  }, 800);
}
let exportCanvas = null;

// 监听计算结果变化
document.addEventListener('DOMContentLoaded', () => {
  const spc = document.getElementById('spc-main');
  if (spc) {
    spc.addEventListener('result', e => {
      latestResult = e.detail;
      // 有结果就激活「出方案」按钮
      const btnPlan = document.getElementById('btn-to-plan');
      if (btnPlan && latestResult && latestResult.totalRevenue > 0) {
        btnPlan.disabled = false;
        btnPlan.style.opacity = '1';
        btnPlan.style.cursor = 'pointer';
      }
    });
  }
});

async function exportImage() {
  const spc = document.getElementById('spc-main');
  const result = spc?.getResult ? spc.getResult() : latestResult;
  
  if (!result || result.totalRevenue === 0) {
    showToast('⚠️ 请先填写门店数据再导出');
    return;
  }

  const btn = document.getElementById('btn-export');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';

  try {
    // 注入导出HTML到隐藏目标
    const target = document.getElementById('screenshot-target');
    target.innerHTML = buildExportHTML(result);

    // 等待渲染
    await new Promise(r => setTimeout(r, 300));

    // html2canvas截图
    const canvas = await html2canvas(target.firstElementChild, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      width: 820,
    });

    exportCanvas = canvas;

    // 显示预览
    const previewCanvas = document.getElementById('export-canvas');
    const ctx = previewCanvas.getContext('2d');
    previewCanvas.width = canvas.width;
    previewCanvas.height = canvas.height;
    ctx.drawImage(canvas, 0, 0);

    document.getElementById('export-preview-container').classList.add('visible');
    showToast('✅ 图片生成成功，点「保存图片」下载');
  } catch (e) {
    console.error(e);
    showToast('❌ 生成失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📸 导出图片';
  }
}

function downloadImage() {
  if (!exportCanvas) return;
  const link = document.createElement('a');
  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  link.download = `盈利测算_${ts}.png`;
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
  showToast('✅ 已保存到下载文件夹');
}

function closePreview() {
  document.getElementById('export-preview-container').classList.remove('visible');
}
</script>
</body>
</html>
