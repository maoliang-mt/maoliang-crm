<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>猫粮CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e0e0e0;font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:14px 16px;border-bottom:1px solid #2a2a3e;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:700;color:#fff}
header h1 span{color:#e8001c}
.hdr-r{display:flex;align-items:center;gap:8px}
.utime{font-size:10px;color:#555}
.rbtn{background:#1e3a5f;color:#4fc3f7;border:1px solid #2a5a8f;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .2s}
.rbtn:active{background:#2a5a8f}
.rbtn.ld{opacity:.5;pointer-events:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.sc{background:#1a1a2e;border-radius:10px;padding:10px;text-align:center;border:1px solid #2a2a3e}
.sc .n{font-size:22px;font-weight:700}.sc .l{font-size:10px;color:#888;margin-top:2px}
.gold{color:#ffd700!important}
/* search & filter bar */
.filter-bar{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap}
.search-box{flex:1;min-width:120px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:6px 10px;color:#e0e0e0;font-size:13px;outline:none}
.search-box:focus{border-color:#4fc3f7}
.filter-sel{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:6px 8px;color:#aaa;font-size:12px;outline:none;-webkit-appearance:none;appearance:none}
.tabs{display:flex;padding:0 16px;gap:6px;overflow-x:auto}
.tab{padding:6px 12px;border-radius:18px;font-size:12px;cursor:pointer;white-space:nowrap;border:1px solid #2a2a3e;background:transparent;color:#888;transition:all .2s}
.tab.active{background:#e8001c;color:#fff;border-color:#e8001c}
.content{padding:10px 16px}
.stitle{font-size:11px;color:#555;margin:10px 0 6px;letter-spacing:1px}
.card{background:#1a1a2e;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid #333}
.card.overdue{border-left-color:#e8001c}.card.today{border-left-color:#ff9800}.card.soon{border-left-color:#4caf50}.card.prospect{border-left-color:#2196f3}
.cname{font-size:14px;font-weight:600;color:#fff}
.cmeta{font-size:11px;color:#666;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px}
.badge-overdue{background:rgba(232,0,28,.2);color:#e8001c}
.badge-today{background:rgba(255,152,0,.2);color:#ff9800}
.badge-soon{background:rgba(76,175,80,.2);color:#4caf50}
.cnote{font-size:11px;color:#777;margin-top:5px;background:#111;padding:5px 8px;border-radius:6px;line-height:1.4}
.ctags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.ctag{font-size:10px;padding:1px 6px;border-radius:4px;background:#222;color:#888;border:1px solid #333}
.gb{display:inline-block;width:16px;height:16px;border-radius:50%;text-align:center;line-height:16px;font-size:10px;font-weight:700;margin-left:5px}
.gb-A{background:#e8001c;color:#fff}.gb-B{background:#ff9800;color:#fff}.gb-C{background:#607d8b;color:#fff}
.empty{text-align:center;padding:30px 16px;color:#444;font-size:13px}
@media(max-width:400px){.stats{grid-template-columns:repeat(2,1fr)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>
<body>
<header>
  <h1>猫粮 <span>CRM</span></h1>
  <div class="hdr-r">
    <div class="utime" id="ut">...</div>
    <button class="rbtn" id="rb" onclick="loadData()"><span id="ri">↻</span> 刷新</button>
  </div>
</header>
<div class="stats" id="stats"></div>
<div class="filter-bar">
  <input class="search-box" id="searchBox" placeholder="🔍 搜索门店/联系人/备注" oninput="applyFilter()">
  <select class="filter-sel" id="filterArea" onchange="applyFilter()"><option value="">全部区域</option></select>
  <select class="filter-sel" id="filterCat" onchange="applyFilter()"><option value="">全部品类</option></select>
</div>
<div class="tabs" id="tabBar">
  <div class="tab active" onclick="showTab('remind')">跟进提醒</div>
  <div class="tab" onclick="showTab('prospect')">意向客</div>
  <div class="tab" onclick="showTab('signed')">已签约</div>
  <div class="tab" onclick="showTab('all')">全部</div>
</div>
<div class="content" id="content"><div class="empty">数据加载中...</div></div>
<script>
let customers=[],filtered=[];
let _tab='remind',_search='',_area='',_cat='';

async function loadData(){
  const b=document.getElementById('rb'),i=document.getElementById('ri');
  b.classList.add('ld');i.classList.add('spin');
  try{
    const r=await fetch('data.json?t='+Date.now());
    const j=await r.json();
    customers=j.customers||[];
    document.getElementById('ut').textContent=j.updateTime||'';
    buildFilters();applyFilter();
  }catch(e){document.getElementById('content').innerHTML='<div class="empty">加载失败</div>';}
  finally{b.classList.remove('ld');i.classList.remove('spin');}
}

function buildFilters(){
  const areas=new Set(),cats=new Set();
  customers.forEach(c=>{if(c.area)areas.add(c.area);if(c.category)cats.add(c.category);});
  const asel=document.getElementById('filterArea');
  asel.innerHTML='<option value="">全部区域</option>'+[...areas].sort().map(a=>'<option value="'+a+'">'+a+'</option>').join('');
  const csel=document.getElementById('filterCat');
  csel.innerHTML='<option value="">全部品类</option>'+[...cats].sort().map(c=>'<option value="'+c+'">'+c+'</option>').join('');
}

function applyFilter(){
  _search=document.getElementById('searchBox').value.toLowerCase();
  _area=document.getElementById('filterArea').value;
  _cat=document.getElementById('filterCat').value;
  filtered=customers.filter(c=>{
    if(_area&&c.area!==_area) return false;
    if(_cat&&c.category!==_cat) return false;
    if(_search){
      const hay=(c.name+c.contact+c.note+c.product+c.area+c.category).toLowerCase();
      if(!hay.includes(_search)) return false;
    }
    return true;
  });
  updateStats();renderContent();
}

const today=new Date();today.setHours(0,0,0,0);
function dd(ts){if(!ts)return 9999;const d=new Date(Number(ts));d.setHours(0,0,0,0);return Math.ceil((d-today)/864e5);}
function fd(ts){if(!ts)return'';const d=new Date(Number(ts));return(d.getMonth()+1)+'/'+(d.getDate());}
function badge(c){const d=dd(c.visitTs);if(!c.visitTs)return'';if(d<0)return'<span class="badge badge-overdue">逾期'+Math.abs(d)+'天</span>';if(d===0)return'<span class="badge badge-today">今日</span>';if(d<=7)return'<span class="badge badge-soon">'+d+'天后</span>';return'';}
function gb(c){if(!c.grade||c.type!=='signed')return'';return'<span class="gb gb-'+c.grade+'">'+c.grade+'</span>';}
function cc(c){const d=dd(c.visitTs);if(!c.visitTs)return c.type==='prospect'?'prospect':'';if(d<0)return'overdue';if(d===0)return'today';if(d<=7)return'soon';return c.type==='prospect'?'prospect':'';}
function rc(c){
  const d=dd(c.visitTs);
  const ds=c.visitTs?'<span>\u{1F4C5} '+(d===0?'\u4ECA\u5929':fd(c.visitTs))+'</span>':'';
  const am=c.amount?'<span>\u{1F4B0} \xA5'+c.amount+'</span>':'';
  let tags='';
  if(c.area||c.category||c.product){
    tags='<div class="ctags">';
    if(c.area) tags+='<span class="ctag">'+c.area+'</span>';
    if(c.category) tags+='<span class="ctag">'+c.category+'</span>';
    if(c.product) tags+='<span class="ctag">'+c.product+'</span>';
    tags+='</div>';
  }
  return '<div class="card '+cc(c)+'"><div class="cname">'+c.name+gb(c)+badge(c)+'</div><div class="cmeta">'+(c.contact?'<span>\u{1F464} '+c.contact+'</span>':'')+(c.phone?'<span>\u{1F4DE} '+c.phone+'</span>':'')+am+ds+'<span>'+(c.type==='signed'?'\u2705 \u5DF2\u7B7E\u7EA6':'\u{1F3AF} \u8DDF\u8FDB\u4E2D')+'</span></div>'+tags+(c.note?'<div class="cnote">'+c.note+'</div>':'')+'</div>';
}
function updateStats(){
  const exp=filtered.filter(c=>c.visitTs&&dd(c.visitTs)<0).length;
  const td=filtered.filter(c=>c.visitTs&&dd(c.visitTs)===0).length;
  const sn=filtered.filter(c=>c.visitTs&&dd(c.visitTs)>0&&dd(c.visitTs)<=7).length;
  const ta=filtered.reduce((s,c)=>s+(c.amount||0),0);
  const as=ta>=10000?(ta/10000).toFixed(1)+'\u4E07':'\xA5'+ta;
  document.getElementById('stats').innerHTML='<div class="sc"><div class="n" style="color:#e8001c">'+exp+'</div><div class="l">\u5DF2\u903E\u671F</div></div><div class="sc"><div class="n" style="color:#ff9800">'+td+'</div><div class="l">\u4ECA\u65E5\u8DDF\u8FDB</div></div><div class="sc"><div class="n" style="color:#4caf50">'+sn+'</div><div class="l">7\u5929\u5185</div></div><div class="sc"><div class="n gold">'+as+'</div><div class="l">\u7B7E\u7EA6\u989D</div></div>';
}
function renderContent(){
  const tab=_tab;let h='';
  if(tab==='remind'){
    const exp=filtered.filter(c=>c.visitTs&&dd(c.visitTs)<0).sort((a,b)=>a.visitTs-b.visitTs);
    const td=filtered.filter(c=>c.visitTs&&dd(c.visitTs)===0);
    const sn=filtered.filter(c=>c.visitTs&&dd(c.visitTs)>0&&dd(c.visitTs)<=7).sort((a,b)=>a.visitTs-b.visitTs);
    if(exp.length) h+='<div class="stitle">\u26A0\uFE0F \u5DF2\u903E\u671F</div>'+exp.map(rc).join('');
    if(td.length) h+='<div class="stitle">\u{1F525} \u4ECA\u65E5\u8DDF\u8FDB</div>'+td.map(rc).join('');
    if(sn.length) h+='<div class="stitle">\u{1F4C6} 7\u5929\u5185</div>'+sn.map(rc).join('');
    if(!h) h='<div class="empty">\u{1F389} \u8FD1\u671F\u65E0\u5F85\u8DDF\u8FDB\uFF0C\u7EE7\u7EED\u51B2\uFF01</div>';
  } else if(tab==='prospect'){
    const l=filtered.filter(c=>c.type==='prospect');
    h=l.length?l.map(rc).join(''):'<div class="empty">\u6682\u65E0\u610F\u5411\u5BA2</div>';
  } else if(tab==='signed'){
    const l=filtered.filter(c=>c.type==='signed').sort((a,b)=>'ABCD'.indexOf(a.grade)-'ABCD'.indexOf(b.grade));
    h=l.length?l.map(rc).join(''):'<div class="empty">\u6682\u65E0</div>';
  } else { h=filtered.map(rc).join(''); }
  document.getElementById('content').innerHTML=h;
}
function showTab(t){_tab=t;document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',['remind','prospect','signed','all'][i]===t));renderContent();}
loadData();
</script>
</body>
</html>
