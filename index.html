<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫粮CRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e0e0e0; font-family: -apple-system, 'PingFang SC', sans-serif; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 20px; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 700; color: #fff; }
  header h1 span { color: #e8001c; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .update-time { font-size: 11px; color: #666; }
  .refresh-btn { background: #1e3a5f; color: #4fc3f7; border: 1px solid #2a5a8f; border-radius: 16px; padding: 5px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
  .refresh-btn:active { background: #2a5a8f; }
  .refresh-btn.loading { opacity: 0.6; pointer-events: none; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px; }
  .stat-card { background: #1a1a2e; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #2a2a3e; }
  .stat-card .num { font-size: 24px; font-weight: 700; color: #e8001c; }
  .stat-card .label { font-size: 11px; color: #888; margin-top: 4px; }
  .tabs { display: flex; padding: 0 16px; gap: 8px; overflow-x: auto; }
  .tab { padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; border: 1px solid #2a2a3e; background: transparent; color: #888; transition: all 0.2s; }
  .tab.active { background: #e8001c; color: #fff; border-color: #e8001c; }
  .content { padding: 12px 16px; }
  .section-title { font-size: 12px; color: #666; margin: 12px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
  .card { background: #1a1a2e; border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #333; }
  .card.overdue { border-left-color: #e8001c; }
  .card.today { border-left-color: #ff9800; }
  .card.soon { border-left-color: #4caf50; }
  .card.prospect { border-left-color: #2196f3; }
  .card-name { font-size: 15px; font-weight: 600; color: #fff; }
  .card-meta { font-size: 12px; color: #666; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .badge-overdue { background: rgba(232,0,28,0.2); color: #e8001c; }
  .badge-today { background: rgba(255,152,0,0.2); color: #ff9800; }
  .badge-soon { background: rgba(76,175,80,0.2); color: #4caf50; }
  .badge-prospect { background: rgba(33,150,243,0.2); color: #2196f3; }
  .card-note { font-size: 12px; color: #888; margin-top: 6px; background: #111; padding: 6px 8px; border-radius: 6px; }
  .grade-badge { display:inline-block; width:18px; height:18px; border-radius:50%; text-align:center; line-height:18px; font-size:11px; font-weight:700; margin-left:6px; }
  .grade-A { background:#e8001c; color:#fff; }
  .grade-B { background:#ff9800; color:#fff; }
  .grade-C { background:#607d8b; color:#fff; }
  .loading-overlay { text-align:center; padding:40px; color:#555; }
  .empty { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; }
  @media(max-width: 400px) { .stats { grid-template-columns: repeat(2,1fr); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display:inline-block; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<header>
  <h1>猫粮 <span>CRM</span></h1>
  <div class="header-right">
    <div class="update-time" id="updateTime">加载中...</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span id="refreshIcon">↻</span> 刷新
    </button>
  </div>
</header>
<div class="stats" id="stats"></div>
<div class="tabs">
  <div class="tab active" onclick="showTab('remind')">跟进提醒</div>
  <div class="tab" onclick="showTab('prospect')">意向客</div>
  <div class="tab" onclick="showTab('signed')">已签约</div>
  <div class="tab" onclick="showTab('all')">全部</div>
</div>
<div class="content" id="content"><div class="loading-overlay">数据加载中...</div></div>
<script>
let customers = [];
window._tab = 'remind';

const DATA_URL = 'data.json?t=' + Date.now();

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.classList.add('loading');
  icon.classList.add('spin');
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    customers = json.customers || [];
    document.getElementById('updateTime').textContent = '更新: ' + (json.updateTime || '');
    updateStats();
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">数据加载失败，请稍后重试</div>';
  } finally {
    btn.classList.remove('loading');
    icon.classList.remove('spin');
  }
}

const today = new Date(); today.setHours(0,0,0,0);
function daysDiff(ts) { if(!ts) return 9999; const d=new Date(Number(ts)); d.setHours(0,0,0,0); return Math.ceil((d-today)/86400000); }
function fmtDate(ts) { if(!ts) return ''; const d=new Date(Number(ts)); return (d.getMonth()+1)+'/'+(d.getDate()); }
function getBadge(c) { const diff=daysDiff(c.visitTs); if(!c.visitTs) return ''; if(diff<0) return '<span class="badge badge-overdue">逾期'+Math.abs(diff)+'天</span>'; if(diff===0) return '<span class="badge badge-today">今日跟进</span>'; if(diff<=7) return '<span class="badge badge-soon">'+diff+'天后</span>'; return ''; }
function getGradeBadge(c) { if(!c.grade||c.type!=='signed') return ''; return '<span class="grade-badge grade-'+c.grade+'">'+c.grade+'</span>'; }
function cardClass(c) { const diff=daysDiff(c.visitTs); if(!c.visitTs) return c.type==='prospect'?'prospect':''; if(diff<0) return 'overdue'; if(diff===0) return 'today'; if(diff<=7) return 'soon'; return c.type==='prospect'?'prospect':''; }
function renderCard(c) {
  const diff=daysDiff(c.visitTs);
  const dateStr=c.visitTs?'<span>📅 '+(diff===0?'今天':fmtDate(c.visitTs))+'</span>':'';
  return '<div class="card '+cardClass(c)+'"><div class="card-name">'+c.name+getGradeBadge(c)+getBadge(c)+'</div><div class="card-meta">'+(c.contact?'<span>👤 '+c.contact+'</span>':'')+(c.phone?'<span>📞 '+c.phone+'</span>':'')+dateStr+'<span>'+(c.type==='signed'?'✅ 已签约':'🎯 跟进中')+'</span></div>'+(c.note?'<div class="card-note">'+c.note+'</div>':'')+'</div>';
}
function updateStats() {
  const expired=customers.filter(c=>c.visitTs&&daysDiff(c.visitTs)<0).length;
  const todayCnt=customers.filter(c=>c.visitTs&&daysDiff(c.visitTs)===0).length;
  const soon=customers.filter(c=>c.visitTs&&daysDiff(c.visitTs)>0&&daysDiff(c.visitTs)<=7).length;
  document.getElementById('stats').innerHTML='<div class="stat-card"><div class="num" style="color:#e8001c">'+expired+'</div><div class="label">已逾期</div></div><div class="stat-card"><div class="num" style="color:#ff9800">'+todayCnt+'</div><div class="label">今日跟进</div></div><div class="stat-card"><div class="num" style="color:#4caf50">'+soon+'</div><div class="label">7天内</div></div><div class="stat-card"><div class="num" style="color:#aaa">'+customers.length+'</div><div class="label">总客户</div></div>';
}
function renderContent() {
  const tab=window._tab; let html='';
  if(tab==='remind') { const exp=customers.filter(c=>c.visitTs&&daysDiff(c.visitTs)<0).sort((a,b)=>a.visitTs-b.visitTs); const td=customers.filter(c=>c.visitTs&&daysDiff(c.visitTs)===0); const sn=customers.filter(c=>c.visitTs&&daysDiff(c.visitTs)>0&&daysDiff(c.visitTs)<=7).sort((a,b)=>a.visitTs-b.visitTs); if(exp.length) html+='<div class="section-title">⚠️ 已逾期</div>'+exp.map(renderCard).join(''); if(td.length) html+='<div class="section-title">🔥 今日跟进</div>'+td.map(renderCard).join(''); if(sn.length) html+='<div class="section-title">📆 7天内</div>'+sn.map(renderCard).join(''); if(!html) html='<div class="empty">🎉 近期没有待跟进客户，今天状态保持好继续冲！</div>'; }
  else if(tab==='prospect') { const l=customers.filter(c=>c.type==='prospect'); html=l.length?l.map(renderCard).join(''):'<div class="empty">暂无意向客</div>'; }
  else if(tab==='signed') { const l=customers.filter(c=>c.type==='signed').sort((a,b)=>{ const ga='ABCD'.indexOf(a.grade); const gb='ABCD'.indexOf(b.grade); return ga-gb; }); html=l.length?l.map(renderCard).join(''):'<div class="empty">暂无已签约客户</div>'; }
  else { html=customers.map(renderCard).join(''); }
  document.getElementById('content').innerHTML=html;
}
function showTab(t) { window._tab=t; document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['remind','prospect','signed','all'][i]===t)); renderContent(); }

// 首次加载
loadData();
</script>
</body>
</html>
