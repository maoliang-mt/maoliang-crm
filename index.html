<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>猫粮CRM</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="猫粮CRM">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--card:#12121a;--card-hover:#181825;--border:#1e1e2e;
  --red:#e8001c;--red-bg:rgba(232,0,28,.12);
  --orange:#ff9800;--orange-bg:rgba(255,152,0,.12);
  --green:#4caf50;--green-bg:rgba(76,175,80,.12);
  --blue:#4fc3f7;--blue-bg:rgba(79,195,247,.12);
  --gold:#ffd700;--gold-bg:rgba(255,215,0,.12);
  --text:#e8e8f0;--text2:#8888a0;--text3:#555568;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Display',system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom)}

/* ── Header ── */
header{background:linear-gradient(135deg,#13132a 0%,#0d1b2a 100%);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.04)}
header h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
header h1 .logo{width:28px;height:28px;background:linear-gradient(135deg,var(--red),#ff4444);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
header h1 .brand{color:var(--red);font-weight:800}
.hdr-r{display:flex;align-items:center;gap:10px}
.utime{font-size:10px;color:var(--text3);background:rgba(255,255,255,.04);padding:3px 8px;border-radius:12px}
.rbtn{background:linear-gradient(135deg,rgba(79,195,247,.12),rgba(79,195,247,.06));color:var(--blue);border:1px solid rgba(79,195,247,.2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .3s ease}
.rbtn:hover{background:rgba(79,195,247,.2);border-color:rgba(79,195,247,.4)}
.rbtn:active{transform:scale(.95)}
.rbtn.ld{opacity:.5;pointer-events:none}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 20px}
.sc{background:var(--card);border-radius:14px;padding:14px 12px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden;transition:transform .2s}
.sc:active{transform:scale(.97)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0}
.sc:nth-child(1)::before{background:var(--red)}.sc:nth-child(2)::before{background:var(--orange)}.sc:nth-child(3)::before{background:var(--green)}.sc:nth-child(4)::before{background:var(--gold)}
.sc .n{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.sc:nth-child(1) .n{color:var(--red)}.sc:nth-child(2) .n{color:var(--orange)}.sc:nth-child(3) .n{color:var(--green)}.sc:nth-child(4) .n{color:var(--gold)}
.sc .l{font-size:10px;color:var(--text3);margin-top:4px;font-weight:500;letter-spacing:.5px}

/* ── Filter ── */
.filter-bar{padding:4px 20px 8px;display:flex;gap:8px;flex-wrap:wrap}
.search-box{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-size:13px;outline:none;transition:all .3s}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,195,247,.1)}
.filter-sel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text2);font-size:12px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .3s}
.filter-sel:focus{border-color:var(--blue)}

/* ── Tabs ── */
.tabs{display:flex;padding:4px 20px 12px;gap:6px 8px;flex-wrap:wrap}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .3s ease;user-select:none;-webkit-user-select:none}
.tab:active{transform:scale(.95)}
.tab.active{background:linear-gradient(135deg,var(--red),#ff2244);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(232,0,28,.3)}

/* ── Cards ── */
.content{padding:6px 20px 20px}
.stitle{font-size:11px;color:var(--text3);margin:14px 0 8px;letter-spacing:1.5px;font-weight:600;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

.card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--border);position:relative;transition:all .25s ease;overflow:hidden}
.card:active{transform:scale(.985);background:var(--card-hover)}
.card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 14px 0 60px;opacity:.03;pointer-events:none}
.card.overdue{border-left-color:var(--red)}.card.overdue::after{background:var(--red)}
.card.today{border-left-color:var(--orange)}.card.today::after{background:var(--orange)}
.card.soon{border-left-color:var(--green)}.card.soon::after{background:var(--green)}
.card.prospect{border-left-color:var(--blue)}.card.prospect::after{background:var(--blue)}

.cname{font-size:15px;font-weight:700;color:#fff;padding-right:80px;line-height:1.4}
.cmeta{font-size:11px;color:var(--text3);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;line-height:1.6}
.cmeta span{display:inline-flex;align-items:center;gap:2px}

.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;margin-left:6px;letter-spacing:.3px}
.badge-overdue{background:var(--red-bg);color:var(--red)}
.badge-today{background:var(--orange-bg);color:var(--orange)}
.badge-soon{background:var(--green-bg);color:var(--green)}
.badge-renewal{background:var(--gold-bg);color:var(--gold)}

.anniv{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;margin-left:6px;background:var(--gold-bg);color:var(--gold)}

.cnote{font-size:11px;color:var(--text2);margin-top:8px;background:rgba(255,255,255,.03);padding:8px 10px;border-radius:8px;line-height:1.5;border:1px solid rgba(255,255,255,.04)}
.ctags{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap}
.ctag{font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:var(--text2);font-weight:500;letter-spacing:.3px}

.gb{display:inline-flex;width:18px;height:18px;border-radius:6px;align-items:center;justify-content:center;font-size:10px;font-weight:800;margin-left:6px;letter-spacing:0}
.gb-A{background:linear-gradient(135deg,var(--red),#ff4444);color:#fff}
.gb-B{background:linear-gradient(135deg,var(--orange),#ffb74d);color:#fff}
.gb-C{background:linear-gradient(135deg,#546e7a,#78909c);color:#fff}

/* ── Action Buttons ── */
.card-actions{position:absolute;top:10px;right:12px;display:flex;gap:6px}
.act-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;color:var(--text3)}
.act-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.act-btn:active{transform:scale(.9);background:rgba(255,255,255,.12)}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}

/* ── Modal ── */
.modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;justify-content:center;align-items:flex-end}
.modal-mask.show{display:flex}
.modal{background:#16162a;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px calc(30px + env(safe-area-inset-bottom));animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.modal .sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.modal textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;padding:12px 14px;min-height:90px;resize:vertical;outline:none;font-family:inherit;transition:border-color .3s;line-height:1.5}
.modal textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,195,247,.1)}
.modal-btns{display:flex;gap:10px;margin-top:14px}
.modal-btns button{flex:1;padding:12px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.modal-btns button:active{transform:scale(.97)}
.btn-cancel{background:rgba(255,255,255,.06);color:var(--text2)}
.btn-send{background:linear-gradient(135deg,var(--red),#ff2244);color:#fff;box-shadow:0 4px 16px rgba(232,0,28,.3)}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(20,20,35,.95);color:var(--green);padding:10px 20px;border-radius:14px;font-size:13px;font-weight:600;z-index:200;display:none;backdrop-filter:blur(12px);border:1px solid rgba(76,175,80,.2);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-30px)}to{opacity:1;transform:translateX(-50%) translateY(-20px)}}

/* ── Cases Tab ── */
.cases-grid{display:grid;grid-template-columns:1fr;gap:12px}
.case-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);transition:all .25s;cursor:pointer;position:relative;overflow:hidden}
.case-card:active{transform:scale(.985);background:var(--card-hover)}
.case-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.case-card.fmt-pptx::before{background:linear-gradient(90deg,var(--red),#ff4444)}
.case-card.fmt-docx::before{background:linear-gradient(90deg,var(--blue),#64b5f6)}
.case-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.case-name{font-size:15px;font-weight:700;color:#fff}
.case-fmt{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:700;letter-spacing:.3px}
.case-fmt.pptx{background:var(--red-bg);color:var(--red)}
.case-fmt.docx{background:var(--blue-bg);color:var(--blue)}
.case-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.6}
.case-meta span{display:inline-flex;align-items:center;gap:3px}
.case-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.case-tag{font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:var(--text2);font-weight:500}
.case-stars{color:var(--gold);font-size:12px;letter-spacing:1px}
.case-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-top:6px;background:rgba(255,255,255,.03);padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.04)}
.case-actions{display:flex;gap:8px;margin-top:10px}
.case-btn{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;text-align:center;transition:all .2s}
.case-btn:active{transform:scale(.97)}
.case-btn-view{background:rgba(79,195,247,.1);color:var(--blue);border:1px solid rgba(79,195,247,.2)}
.case-btn-view:hover{background:rgba(79,195,247,.18)}
.case-btn-copy{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border)}
.case-btn-copy:hover{background:rgba(255,255,255,.08)}
.case-detail{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .25s ease;opacity:0}
.case-card.expanded .case-detail{max-height:800px;opacity:1;margin-top:10px}
.case-card.expanded{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),0 4px 24px rgba(79,195,247,.12)}
.case-detail-inner{border-top:1px solid var(--border);padding-top:10px}
.case-kv{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:12px;margin-bottom:8px}
.case-kv-item{color:var(--text2);line-height:1.6}
.case-kv-item .ck-l{color:var(--text3);font-size:10px;letter-spacing:.5px}
.case-kv-item .ck-v{color:var(--text)}
.case-highlights{list-style:none;padding:0;margin:0}
.case-highlights li{font-size:11px;color:var(--text2);padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.04);line-height:1.5}
.case-highlights li:last-child{border-bottom:none}
.case-highlights li::before{content:'✦';color:var(--gold);margin-right:6px}

/* ── Week View ── */
.week-day{margin-bottom:16px}
.week-day-hdr{font-size:12px;font-weight:700;color:var(--text2);padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.week-day-hdr .wd-date{color:var(--text)}
.week-day.wd-today .week-day-hdr{background:rgba(232,0,28,.08);border-color:rgba(232,0,28,.2);color:var(--red)}
.week-day.wd-today .week-day-hdr .wd-date{color:var(--red)}
.week-day.wd-past .week-day-hdr{opacity:.7}

/* ── Funnel View ── */
.funnel-stage{margin-bottom:20px}
.funnel-bar-wrap{margin-bottom:10px}
.funnel-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;font-weight:600}
.funnel-label .fl-name{color:var(--text)}
.funnel-label .fl-stats{color:var(--text3);font-weight:500}
.funnel-bar{height:28px;border-radius:8px;background:rgba(255,255,255,.04);overflow:hidden;position:relative}
.funnel-bar-fill{height:100%;border-radius:8px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:700;color:#fff;min-width:24px}
.funnel-bar-fill.fb-prospect{background:linear-gradient(90deg,var(--blue),rgba(79,195,247,.7))}
.funnel-bar-fill.fb-negotiate{background:linear-gradient(90deg,var(--orange),rgba(255,152,0,.7))}
.funnel-bar-fill.fb-signed{background:linear-gradient(90deg,var(--green),rgba(76,175,80,.7))}
.funnel-arrow{text-align:center;color:var(--text3);font-size:16px;margin:6px 0}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--red),#ff2244);color:#fff;font-size:26px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 4px 20px rgba(232,0,28,.4);z-index:60;transition:all .2s}
.fab:active{transform:scale(.9)}

/* ── Quick Follow Modal ── */
.qf-select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;padding:10px 14px;outline:none;margin-bottom:10px;-webkit-appearance:none;appearance:none;transition:border-color .3s}
.qf-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,195,247,.1)}
.qf-date{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;padding:10px 14px;outline:none;margin-bottom:10px;-webkit-appearance:none;transition:border-color .3s;color-scheme:dark}
.qf-date:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,195,247,.1)}

/* ── Expanded Card Detail ── */
.card.expanded{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),0 4px 24px rgba(79,195,247,.12)}
.card-detail{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .25s ease;opacity:0}
.card.expanded .card-detail{max-height:600px;opacity:1;margin-top:10px}
.card-detail-inner{border-top:1px solid var(--border);padding-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.cd-row{font-size:12px;color:var(--text2);line-height:1.6}
.cd-row .cd-label{color:var(--text3);font-size:10px;letter-spacing:.5px}
.cd-row .cd-val{color:var(--text)}
.cd-full{grid-column:1/-1}
.cd-history{grid-column:1/-1;margin-top:6px;padding-top:8px;border-top:1px dashed var(--border)}
.cd-history-title{font-size:10px;color:var(--text3);letter-spacing:1px;font-weight:600;margin-bottom:4px}

/* ── Stats Tab ── */
.stats-tab{padding:0 0 20px}
.stats-section{margin-bottom:20px}
.stats-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stats-overview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.so-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.so-card .so-num{font-size:28px;font-weight:800;line-height:1.1}
.so-card .so-lbl{font-size:11px;color:var(--text3);margin-top:4px}
.so-card:nth-child(1) .so-num{color:var(--blue)}
.so-card:nth-child(2) .so-num{color:var(--orange)}
.so-card:nth-child(3) .so-num{color:var(--green)}
.so-card:nth-child(4) .so-num{color:var(--red)}

/* CSS Pie Chart */
.pie-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.pie{width:120px;height:120px;border-radius:50%;position:relative;flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:6px}
.pie-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.pie-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Bar Charts */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--text2);width:56px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;min-width:18px;transition:width .5s ease}
.bar-count{font-size:11px;color:var(--text3);width:32px;text-align:right;flex-shrink:0}

/* Grade Distribution */
.grade-row{display:flex;gap:10px;flex-wrap:wrap}
.grade-card{flex:1;min-width:60px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.grade-card .gc-grade{font-size:20px;font-weight:800;line-height:1}
.grade-card .gc-count{font-size:18px;font-weight:700;margin-top:4px}
.grade-card .gc-pct{font-size:10px;color:var(--text3);margin-top:2px}
.grade-card.gc-A{border-color:rgba(232,0,28,.3)}.grade-card.gc-A .gc-grade{color:var(--red)}.grade-card.gc-A .gc-count{color:var(--red)}
.grade-card.gc-B{border-color:rgba(255,152,0,.3)}.grade-card.gc-B .gc-grade{color:var(--orange)}.grade-card.gc-B .gc-count{color:var(--orange)}
.grade-card.gc-C{border-color:rgba(136,136,160,.3)}.grade-card.gc-C .gc-grade{color:var(--text2)}.grade-card.gc-C .gc-count{color:var(--text2)}
.grade-card.gc-D{border-color:rgba(85,85,104,.3)}.grade-card.gc-D .gc-grade{color:var(--text3)}.grade-card.gc-D .gc-count{color:var(--text3)}

/* ── Seagull badges ── */
.sea-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.2px;margin-left:4px}
.sea-urgent{background:rgba(232,0,28,.15);color:var(--red)}
.sea-warn{background:rgba(255,152,0,.15);color:var(--orange)}
.sea-safe{background:rgba(76,175,80,.15);color:var(--green)}
.sea-kp{background:rgba(79,195,247,.12);color:var(--blue);font-size:9px;padding:1px 6px}
.sea-nf{background:rgba(255,152,0,.08);color:var(--orange);font-size:9px;padding:1px 6px}
.sea-info{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--text2)}
.sea-info span{display:inline-flex;align-items:center;gap:3px}

async function loadData(){
  const b=document.getElementById('rb'),i=document.getElementById('ri');
  b.classList.add('ld');i.classList.add('spin');
  try{
    const r=await fetch('data.json?t='+Date.now());
    const j=await r.json();
    // Support both formats: plain array or {customers:[]}
    const raw=Array.isArray(j)?j:(j.customers||[]);
    // Post-process: derive visitTs, signedTs, note, product, category
    raw.forEach(c=>{
      // visitTs: from nextVisit2 (prospect) or nextVisit (signed)
      const vd=c.nextVisit2||c.nextVisit||'';
      c.visitTs=vd?new Date(vd).getTime():null;
      // signedTs
      c.signedTs=c.signDate?new Date(c.signDate).getTime():null;
      // note: merge prospectNote and visitNote
      c.note=c.prospectNote||c.visitNote||'';
      // product: join products array
      c.product=(c.products&&c.products.length)?c.products.join(', '):'';
      // category: use catType if available
      c.category=c.catType||c.category||'';
    });
    customers=raw;
    document.getElementById('ut').textContent=j.updateTime||(Array.isArray(j)?'':'');
    buildFilters();applyFilter();
  }catch(e){document.getElementById('content').innerHTML='<div class="empty">⚠️ 数据加载失败，请稍后刷新</div>';}
  finally{
    b.classList.remove('ld');i.classList.remove('spin');
    // Visual feedback: flash button green briefly
    b.style.background='rgba(76,175,80,.2)';b.style.borderColor='rgba(76,175,80,.4)';
    const origText=b.innerHTML;b.innerHTML='<span>✓</span> 已刷新';
    setTimeout(()=>{b.style.background='';b.style.borderColor='';b.innerHTML=origText;},1200);
  }
}

function buildFilters(){
  const areas=new Set(),cats=new Set();
  customers.forEach(c=>{
    // Use district for seagull, area for others
    if(c.district)areas.add(c.district);
    else if(c.area)areas.add(c.area);
    if(c.category)cats.add(c.category);
  });
  const asel=document.getElementById('filterArea');
  asel.innerHTML='<option value="">全部区域</option>'+[...areas].sort().map(a=>'<option value="'+a+'">'+a+'</option>').join('');
  const csel=document.getElementById('filterCat');
  csel.innerHTML='<option value="">全部品类</option>'+[...cats].sort().map(c=>'<option value="'+c+'">'+c+'</option>').join('');
}

function applyFilter(){
  _search=document.getElementById('searchBox').value.toLowerCase();
  _area=document.getElementById('filterArea').value;
  _cat=document.getElementById('filterCat').value;
  filtered=customers.filter(c=>{
    if(_area&&(c.district||c.area)!==_area) return false;
    if(_cat&&c.category!==_cat) return false;
    if(_search){
      const hay=(c.name+c.contact+c.note+c.product+c.area+c.category+(c.brand||'')+(c.district||'')+(c.barea||'')+(c.poiId||'')).toLowerCase();
      if(!hay.includes(_search)) return false;
    }
    return true;
  });
  updateStats();renderContent();
}

const today=new Date();today.setHours(0,0,0,0);
function dd(ts){if(!ts)return 9999;const d=new Date(Number(ts));d.setHours(0,0,0,0);return Math.ceil((d-today)/864e5);}
function fd(ts){if(!ts)return'';const d=new Date(Number(ts));return(d.getMonth()+1)+'/'+(d.getDate());}
function fdf(d){return(d.getMonth()+1)+'/'+(d.getDate());}

function badge(c){const d=dd(c.visitTs);if(!c.visitTs)return'';if(d<0)return'<span class="badge badge-overdue">逾期'+Math.abs(d)+'天</span>';if(d===0)return'<span class="badge badge-today">今日</span>';if(d<=7)return'<span class="badge badge-soon">'+d+'天后</span>';return'';}
function annivBadge(c){
  if(!c.signedTs||c.type!=='signed')return'';
  const sd=new Date(Number(c.signedTs));
  const now=new Date();
  let nextAnniv=new Date(sd);
  nextAnniv.setFullYear(now.getFullYear());
  if(nextAnniv<now){nextAnniv.setFullYear(now.getFullYear()+1);}
  const diff=Math.ceil((nextAnniv-now)/864e5);
  const years=nextAnniv.getFullYear()-sd.getFullYear();
  if(diff<=7)return'<span class="anniv">🎂 '+years+'周年还有'+diff+'天</span>';
  if(diff===0)return'<span class="anniv">🎉 今天'+years+'周年！</span>';
  return'';
}
function renewalBadge(c){
  if(!c.signedTs||c.type!=='signed')return'';
  const elapsed=Math.floor((Date.now()-Number(c.signedTs))/864e5);
  if(elapsed>=330)return'<span class="badge badge-renewal">⏰ 续约提醒</span>';
  return'';
}
function gb(c){if(!c.grade||c.type!=='signed')return'';return'<span class="gb gb-'+c.grade+'">'+c.grade+'</span>';}
function cc(c){const d=dd(c.visitTs);if(!c.visitTs)return c.type==='prospect'?'prospect':'';if(d<0)return'overdue';if(d===0)return'today';if(d<=7)return'soon';return c.type==='prospect'?'prospect':'';}

function openEdit(idx){

  document.getElementById('modalText').value=c.note||'';
  document.getElementById('modalMask').classList.add('show');
  setTimeout(()=>document.getElementById('modalText').focus(),300);
}
function closeModal(){
  document.getElementById('modalMask').classList.remove('show');

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show';
  setTimeout(()=>{t.className='toast';},2500);
}
function genPlan(idx){
  const c=filtered[idx];
  if(!c)return;
  const info=[];
  info.push(c.name);
  if(c.category) info.push('品类:'+c.category);
  if(c.area) info.push('区域:'+c.area);
  if(c.grade) info.push(c.grade+'级');
  if(c.product) info.push('产品:'+c.product);
  if(c.amount) info.push('签约¥'+c.amount);
  if(c.note) info.push('备注:'+c.note.slice(0,60));
  const msg='让发发2号给【'+c.name+'】出一份运营方案。'+info.join('，');
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>{showToast('✅ 已复制，粘贴发给发发');}).catch(()=>{prompt('复制发给发发：',msg);});
  }else{prompt('复制发给发发：',msg);}
}
function sendNote(){
  if(!_editCustomer) return;
  const txt=document.getElementById('modalText').value.trim();
  if(!txt){showToast('请输入备注内容');return;}
  const c=_editCustomer;
  const msg='#备注 '+c.tableId+' '+c.rowId+' '+c.name+' '+txt;
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>{showToast('已复制到剪贴板，粘贴发给发发');}).catch(()=>{prompt('复制以下内容发给发发：',msg);});
  }else{prompt('复制以下内容发给发发：',msg);}
  closeModal();
}

function submitQF(){
  const idx=document.getElementById('qfCustomer').value;
  const date=document.getElementById('qfDate').value;
  const note=document.getElementById('qfNote').value.trim();
  if(!idx){showToast('请选择客户');return;}
  if(!date){showToast('请选择日期');return;}
  const c=customers[Number(idx)];
  const dStr=date.replace(/^\d{4}-/,'').replace('-','/');
  const msg='#跟进 '+c.name+' '+dStr+(note?' '+note:'');
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>{showToast('已复制，粘贴发给发发');}).catch(()=>{prompt('复制发给发发：',msg);});
  }else{prompt('复制发给发发：',msg);}
  closeQF();
}

  if(!c.fromSeagull||c.remainingDays==null)return'';
  const d=c.remainingDays;
  if(d<=0)return'<span class="sea-badge sea-urgent">🔴 剩余'+d+'天</span>';
  if(d<=3)return'<span class="sea-badge sea-warn">🟡 剩余'+d+'天</span>';
  return'<span class="sea-badge sea-safe">🟢 剩余'+d+'天</span>';
}
function seaKpBadge(c){
  if(!c.fromSeagull||!c.hasKp)return'';
  return'<span class="sea-kp">🔑KP</span>';
}
function seaNfBadge(c){
  if(!c.fromSeagull||!c.notFollowDays)return'';
  return'<span class="sea-nf">⏳未跟'+c.notFollowDays+'天</span>';
}

  const am=c.amount?'<span>💰 ¥'+c.amount.toLocaleString()+'</span>':'';
  const ph=c.phone?'<span><a href="tel:'+c.phone+'" style="color:var(--blue);text-decoration:none">📞 '+c.phone+'</a></span>':'';
  let tags='';
  if(c.area||c.category||c.product||c.catType){
    tags='<div class="ctags">';

    if(c.barea&&c.barea!=='未知商圈') tags+='<span class="ctag">'+c.barea+'</span>';

    if(c.brand) tags+='<span class="ctag" style="background:rgba(255,215,0,.1);color:var(--gold)">🏷'+c.brand+'</span>';
    tags+='</div>';

  // Seagull tags row

    seaTags='<div class="ctags" style="margin-top:4px">'+c.tags.map(t=>'<span class="sea-tag">'+t+'</span>').join('')+'</div>';

  const actions='<div class="card-actions"><button class="act-btn" onclick="genPlan('+idx+')" title="生成方案">📋</button><button class="act-btn" onclick="openEdit('+idx+')" title="编辑备注">✏️</button></div>';

function updateStats(){

}

/* ── Week View ── */
function renderWeek(){
  const wdn=['日','一','二','三','四','五','六'];
  const d=new Date(today);const dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
  let h='';
  for(let i=0;i<7;i++){
    const cur=new Date(mon);cur.setDate(mon.getDate()+i);
    cur.setHours(0,0,0,0);
    const isToday=cur.getTime()===today.getTime();
    const isPast=cur<today;
    const dayItems=filtered.filter(c=>{
      if(!c.visitTs)return false;
      const vd=new Date(Number(c.visitTs));vd.setHours(0,0,0,0);
      return vd.getTime()===cur.getTime();
    });
    // Also show overdue on Monday if past
    const cls='week-day'+(isToday?' wd-today':'')+(isPast&&!isToday?' wd-past':'');
    h+='<div class="'+cls+'">';
    h+='<div class="week-day-hdr"><span>周'+wdn[cur.getDay()]+'</span><span class="wd-date">'+fdf(cur)+'</span>';
    if(isToday)h+='<span style="font-size:10px;background:var(--red);color:#fff;padding:1px 6px;border-radius:8px">今天</span>';
    h+='<span style="margin-left:auto;font-size:10px;color:var(--text3)">'+dayItems.length+'个</span></div>';
    if(dayItems.length){
      dayItems.forEach(c=>{const gi=filtered.indexOf(c);h+=rc(c,gi);});
    }
    h+='</div>';
  }
  // Overdue items without date in this week
  const overdue=filtered.filter(c=>{
    if(!c.visitTs)return false;
    const vd=new Date(Number(c.visitTs));vd.setHours(0,0,0,0);
    return vd<mon;
  });
  if(overdue.length){
    h='<div class="stitle">⚠️ 本周前逾期 ('+overdue.length+')</div>'+overdue.map(c=>rc(c,filtered.indexOf(c))).join('')+h;
  }
  if(!h||(!overdue.length&&filtered.every(c=>!c.visitTs)))h='<div class="empty">本周暂无跟进安排</div>';
  return h;
}

/* ── Funnel View ── */
function renderFunnel(){
  const prospects=filtered.filter(c=>c.type==='prospect');
  const signed=filtered.filter(c=>c.type==='signed');
  // Split signed into "negotiating" (no amount or amount=0) and "signed" (has amount)
  const pAmt=prospects.reduce((s,c)=>s+(c.amount||0),0);
  const sAmt=signed.reduce((s,c)=>s+(c.amount||0),0);
  const maxCount=Math.max(prospects.length,signed.length,1);

  let h='';
  // Stage 1: Prospects
  const pPct=Math.max(Math.round(prospects.length/maxCount*100),8);
  h+='<div class="funnel-stage">';
  h+='<div class="funnel-bar-wrap"><div class="funnel-label"><span class="fl-name">🎯 意向客户</span><span class="fl-stats">'+prospects.length+'个'+(pAmt?' · 预估¥'+pAmt.toLocaleString():'')+'</span></div>';
  h+='<div class="funnel-bar"><div class="funnel-bar-fill fb-prospect" style="width:'+pPct+'%">'+prospects.length+'</div></div></div>';
  if(prospects.length)h+=prospects.map(c=>rc(c,filtered.indexOf(c))).join('');
  h+='</div>';

  h+='<div class="funnel-arrow">▼</div>';

  // Stage 2: Signed
  const sPct=Math.max(Math.round(signed.length/maxCount*100),8);
  h+='<div class="funnel-stage">';
  h+='<div class="funnel-bar-wrap"><div class="funnel-label"><span class="fl-name">✅ 已签约</span><span class="fl-stats">'+signed.length+'个 · ¥'+sAmt.toLocaleString()+'</span></div>';
  h+='<div class="funnel-bar"><div class="funnel-bar-fill fb-signed" style="width:'+sPct+'%">'+signed.length+'</div></div></div>';
  if(signed.length)h+=signed.sort((a,b)=>'ABCD'.indexOf(a.grade)-'ABCD'.indexOf(b.grade)).map(c=>rc(c,filtered.indexOf(c))).join('');
  h+='</div>';

  return h||'<div class="empty">暂无数据</div>';
}

/* ── Stats Tab ── */
function renderStats(){
  const total=filtered.length;
  const signedArr=filtered.filter(c=>c.type==='signed');
  const prospectArr=filtered.filter(c=>c.type==='prospect');
  const signedN=signedArr.length;
  const prospectN=prospectArr.length;
  const cvr=(signedN+prospectN)>0?(signedN/(signedN+prospectN)*100).toFixed(1):0;
  let h='<div class="stats-tab">';

  // Overview cards
  h+='<div class="stats-section"><div class="stats-section-title">📊 总览</div>';
  h+='<div class="stats-overview">';
  h+='<div class="so-card"><div class="so-num">'+total+'</div><div class="so-lbl">总客户数</div></div>';
  h+='<div class="so-card"><div class="so-num">'+prospectN+'</div><div class="so-lbl">意向客户</div></div>';
  h+='<div class="so-card"><div class="so-num">'+signedN+'</div><div class="so-lbl">已签约</div></div>';
  h+='<div class="so-card"><div class="so-num">'+cvr+'%</div><div class="so-lbl">转化率</div></div>';
  h+='</div></div>';

  // Category pie chart (CSS conic-gradient)
  h+='<div class="stats-section"><div class="stats-section-title">🍕 品类分布</div>';
  const catMap={};
  filtered.forEach(c=>{const k=c.category||'未知';catMap[k]=(catMap[k]||0)+1;});
  const catEntries=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const pieColors=['#e8001c','#ff9800','#4caf50','#4fc3f7','#ffd700','#9c27b0','#00bcd4','#ff5722','#8bc34a','#e91e63'];
  if(catEntries.length){
    let gradParts=[];let pctAcc=0;
    catEntries.forEach(([k,v],i)=>{
      const pct=v/total*100;
      const clr=pieColors[i%pieColors.length];
      gradParts.push(clr+' '+pctAcc.toFixed(1)+'% '+(pctAcc+pct).toFixed(1)+'%');
      pctAcc+=pct;
    });
    h+='<div class="pie-wrap">';
    h+='<div class="pie" style="background:conic-gradient('+gradParts.join(',')+');box-shadow:0 0 0 3px var(--border)"></div>';
    h+='<div class="pie-legend">';
    catEntries.forEach(([k,v],i)=>{
      h+='<div class="pie-legend-item"><span class="pie-legend-dot" style="background:'+pieColors[i%pieColors.length]+'"></span>'+k+' <span style="color:var(--text3)">'+v+'个 '+(v/total*100).toFixed(0)+'%</span></div>';
    });
    h+='</div></div>';
  } else {
    h+='<div class="empty">暂无品类数据</div>';
  }
  h+='</div>';

  // Grade distribution
  h+='<div class="stats-section"><div class="stats-section-title">🏅 评级分布</div>';
  const grades=['A','B','C','D'];
  const gradeCounts={};
  grades.forEach(g=>gradeCounts[g]=0);
  filtered.forEach(c=>{if(c.grade&&gradeCounts.hasOwnProperty(c.grade))gradeCounts[c.grade]++;});
  h+='<div class="grade-row">';
  grades.forEach(g=>{
    const cnt=gradeCounts[g];
    const pct=total>0?(cnt/total*100).toFixed(0):0;
    h+='<div class="grade-card gc-'+g+'"><div class="gc-grade">'+g+'</div><div class="gc-count">'+cnt+'</div><div class="gc-pct">'+pct+'%</div></div>';
  });
  h+='</div></div>';

  // Monthly signing trend
  h+='<div class="stats-section"><div class="stats-section-title">📈 月度签约趋势</div>';
  const monthMap={};
  signedArr.forEach(c=>{
    if(!c.signedTs)return;
    const d=new Date(Number(c.signedTs));
    const key=d.getFullYear()+'/'+(d.getMonth()+1);
    monthMap[key]=(monthMap[key]||0)+1;
  });
  const monthEntries=Object.entries(monthMap).sort((a,b)=>a[0].localeCompare(b[0]));
  if(monthEntries.length){
    const maxMonth=Math.max(...monthEntries.map(e=>e[1]));
    h+='<div class="bar-chart">';
    monthEntries.forEach(([m,cnt])=>{
      const pct=Math.max(Math.round(cnt/maxMonth*100),5);
      h+='<div class="bar-row"><div class="bar-label">'+m+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--green),rgba(76,175,80,.6))">'+cnt+'</div></div></div>';
    });
    h+='</div>';
  } else {
    h+='<div class="empty">暂无签约数据</div>';
  }
  h+='</div>';

  // Amount distribution
  h+='<div class="stats-section"><div class="stats-section-title">💰 签约金额分布</div>';
  const ranges=[
    {label:'<5千',min:0,max:5000},
    {label:'5千-1万',min:5000,max:10000},
    {label:'1万-3万',min:10000,max:30000},
    {label:'3万-5万',min:30000,max:50000},
    {label:'5万+',min:50000,max:Infinity}
  ];
  const rangeCounts=ranges.map(r=>({...r,count:0}));
  signedArr.forEach(c=>{
    const amt=c.amount||0;
    for(const rc of rangeCounts){if(amt>=rc.min&&amt<rc.max){rc.count++;break;}}
  });
  const maxRange=Math.max(...rangeCounts.map(r=>r.count),1);
  h+='<div class="bar-chart">';
  const rangeColors=['var(--blue)','var(--green)','var(--orange)','var(--red)','var(--gold)'];
  rangeCounts.forEach((r,i)=>{
    const pct=Math.max(Math.round(r.count/maxRange*100),3);
    h+='<div class="bar-row"><div class="bar-label">'+r.label+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+rangeColors[i]+'">'+r.count+'</div></div></div>';
  });
  h+='</div></div>';

  h+='</div>';
  return h;
}

/* ── Private Sea Tab ── */
function renderSea(){
  const seaItems=filtered.map((c,i)=>({c,i})).filter(o=>o.c.fromSeagull);
  if(!seaItems.length)return'<div class="empty">暂无私海门店数据</div>';
  // Sort by remaining days ascending (most urgent first)
  seaItems.sort((a,b)=>{
    const da=a.c.remainingDays!=null?a.c.remainingDays:999;
    const db=b.c.remainingDays!=null?b.c.remainingDays:999;
    return da-db;
  });
  const urgent=seaItems.filter(o=>o.c.remainingDays!=null&&o.c.remainingDays<=0);
  const warn=seaItems.filter(o=>o.c.remainingDays!=null&&o.c.remainingDays>=1&&o.c.remainingDays<=3);
  const safe=seaItems.filter(o=>o.c.remainingDays==null||o.c.remainingDays>=4);
  let h='';
  if(urgent.length)h+='<div class="stitle">🔴 即将到期 ('+urgent.length+')</div>'+urgent.map(o=>rc(o.c,o.i)).join('');
  if(warn.length)h+='<div class="stitle">🟡 3天内到期 ('+warn.length+')</div>'+warn.map(o=>rc(o.c,o.i)).join('');
  if(safe.length)h+='<div class="stitle">🟢 安全 ('+safe.length+')</div>'+safe.map(o=>rc(o.c,o.i)).join('');
  return h;
}

    const sn=filtered.map((c,i)=>({c,i})).filter(o=>o.c.visitTs&&dd(o.c.visitTs)>0&&dd(o.c.visitTs)<=7).sort((a,b)=>a.c.visitTs-b.c.visitTs);
    if(exp.length) h+='<div class="stitle">⚠️ 已逾期</div>'+exp.map(o=>rc(o.c,o.i)).join('');
    if(td.length) h+='<div class="stitle">🔥 今日跟进</div>'+td.map(o=>rc(o.c,o.i)).join('');
    if(sn.length) h+='<div class="stitle">📆 7天内</div>'+sn.map(o=>rc(o.c,o.i)).join('');
    if(!h) h='<div class="empty">🎉 近期无待跟进，继续冲！</div>';
  } else if(tab==='week'){
    h=renderWeek();
  } else if(tab==='prospect'){
    const l=filtered.map((c,i)=>({c,i})).filter(o=>o.c.type==='prospect');
    h=l.length?l.map(o=>rc(o.c,o.i)).join(''):'<div class="empty">暂无意向客</div>';
  } else if(tab==='signed'){
    const l=filtered.map((c,i)=>({c,i})).filter(o=>o.c.type==='signed').sort((a,b)=>'ABCD'.indexOf(a.c.grade)-'ABCD'.indexOf(b.c.grade));
    h=l.length?l.map(o=>rc(o.c,o.i)).join(''):'<div class="empty">暂无</div>';
  } else if(tab==='sea'){
    h=renderSea();
  } else if(tab==='funnel'){
    h=renderFunnel();
  } else if(tab==='stats'){
    h=renderStats();
  } else if(tab==='cases'){
    h=renderCases();
  } else {
    h=filtered.map((c,i)=>rc(c,i)).join('');
  }
  document.getElementById('content').innerHTML=h;
}

function showTab(t){
  _tab=t;
  document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',_tabs[i]===t));
  renderContent();
}

loadData();
</script>
</body>
</html>
